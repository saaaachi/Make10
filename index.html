<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make 10 - Zen Mode</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { margin: 0; overflow: hidden; background: #fdfbf7; font-family: 'Helvetica Neue', Arial, sans-serif; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        #ad-top-container { position: fixed; top: 0; left: 0; width: 100%; height: 100px; background: #fdfbf7; z-index: 9999; display: flex; justify-content: center; align-items: center; }

        #game-outer { position: absolute; top: 100px; bottom: 0; left: 0; right: 0; background: #fdfbf7; overflow: hidden; z-index: 10; }
        #main-container { height: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        
        #header-ui { width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 20; }
        .ui-box { padding: 12px 20px; border-radius: 15px; font-weight: bold; font-size: 20px; box-shadow: 0 4px rgba(0,0,0,0.05); min-width: 140px; text-align: center; background: #fff; border: 2px solid #eee; }
        #ui { color: #2c3e50; }
        #current-sum { color: #e74c3c; transition: transform 0.1s; }

        #grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 15px; width: 95%; max-width: 420px; flex-grow: 1; align-content: center; }
        .num-card { aspect-ratio: 1/1; background: white; color: #444; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; cursor: pointer; box-shadow: 0 6px #dcdde1; transition: 0.1s; border: 1px solid #f1f2f6; }
        .num-card.selected { background: #ffeaa7; transform: scale(0.92); box-shadow: 0 2px #fdcb6e; border-color: #fdcb6e; color: #2d3436; }
        
        #menuScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; padding: 10px; }
        #ad-middle-box { width: 300px; height: 250px; background: #f5f5f5; margin: 20px 0; display: none; justify-content: center; align-items: center; border-radius: 12px; overflow: hidden; }

        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px; }
        .menu-btn { width: 280px; padding: 18px; font-size: 20px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #retry-btn { background: #3498db; color: white; box-shadow: 0 5px #2980b9; }
        .link-btn { background: #e84393; color: white; box-shadow: 0 5px #c0392b; }

        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 330px; background: #fff; position: relative; border-radius: 8px; }
        #close-ad-btn { position: absolute; top: -50px; right: 0px; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ad-top-container">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-outer">
        <div id="main-container">
            <div id="header-ui">
                <div id="ui" class="ui-box">SCORE: 0</div>
                <div id="current-sum" class="ui-box">SUM: 0</div>
            </div>
            <div id="grid"></div>

            <div id="menuScreen">
                <h2 id="result-msg" style="color:#2980b9; margin: 10px 0; font-size: 36px;">Make 10</h2>
                <p id="sub-msg" style="font-size: 16px; color: #636e72;">10を超えないように足していこう！</p>
                <div id="ad-middle-box">
                    <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="9050127185"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                </div>
                <div class="menu-btn-group">
                    <button id="retry-btn" class="menu-btn" onclick="startNewGame()">★ スタート ★</button>
                    <a href="https://saaaachi.github.io/" class="menu-btn link-btn">他のゲーム</a>
                </div>
            </div>
        </div>
    </div>

    <div id="inter-screen">
        <div class="inter-content">
            <div id="close-ad-btn" onclick="closeInterAd()">5</div>
            <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:8px; background: #fff;"></iframe>
        </div>
    </div>

    <script>
        let score = 0, currentSum = 0, selectedCards = [], gameActive = false, playCount = 0;
        
        const grid = document.getElementById("grid");
        const sumDisplay = document.getElementById("current-sum");
        const scoreDisplay = document.getElementById("ui");
        const menuScreen = document.getElementById("menuScreen");
        const retryBtn = document.getElementById("retry-btn");

        // 出現する数字を生成する関数（1〜4が75%、5〜9が25%）
        function getNextNumber() {
            if (Math.random() < 0.75) {
                return Math.floor(Math.random() * 4) + 1; // 1, 2, 3, 4
            } else {
                return Math.floor(Math.random() * 5) + 5; // 5, 6, 7, 8, 9
            }
        }

        function startNewGame() {
            menuScreen.style.display = "none";
            document.getElementById("ad-middle-box").style.display = "none";
            score = 0; currentSum = 0; selectedCards = []; gameActive = true;
            scoreDisplay.innerText = "SCORE: 0";
            sumDisplay.innerText = "SUM: 0";
            fillGrid();
        }

        function fillGrid() {
            grid.innerHTML = "";
            for(let i=0; i<16; i++) {
                const card = document.createElement("div");
                card.className = "num-card";
                card.innerText = getNextNumber();
                card.onclick = () => tapCard(card);
                grid.appendChild(card);
            }
        }

        function tapCard(card) {
            if(!gameActive) return;

            // キャンセル機能
            if(card.classList.contains('selected')) {
                card.classList.remove('selected');
                selectedCards = selectedCards.filter(c => c !== card);
                currentSum -= parseInt(card.innerText);
                sumDisplay.innerText = "SUM: " + currentSum;
                return;
            }

            card.classList.add('selected');
            selectedCards.push(card);
            currentSum += parseInt(card.innerText);
            sumDisplay.innerText = "SUM: " + currentSum;

            if(currentSum === 10) {
                score++;
                scoreDisplay.innerText = "SCORE: " + score;
                
                selectedCards.forEach(c => {
                    c.style.transform = "scale(0)";
                    setTimeout(() => {
                        c.classList.remove('selected');
                        c.innerText = getNextNumber();
                        c.style.transform = "scale(1)";
                    }, 200);
                });
                resetSelection();
            } else if(currentSum > 10) {
                // 10を超えたらゲームオーバー（スリル維持）
                gameOver("10を超えちゃった！😱");
            }
        }

        function resetSelection() {
            currentSum = 0;
            selectedCards = [];
            sumDisplay.innerText = "SUM: 0";
        }

        function gameOver(msg) {
            gameActive = false; playCount++;
            document.getElementById("ad-middle-box").style.display = "flex";
            document.getElementById("result-msg").innerText = msg;
            document.getElementById("sub-msg").innerText = "最終スコア: " + score;
            menuScreen.style.display = "flex";
            
            retryBtn.disabled = true;
            setTimeout(() => { retryBtn.disabled = false; }, 1000);

            if (playCount === 2 || (playCount >= 5 && (playCount - 2) % 3 === 0)) {
                setTimeout(showInterAd, 500);
            }
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), closeBtn = document.getElementById("close-ad-btn");
            document.getElementById('ifr-inter').src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let t = 5;
            closeBtn.innerText = t; closeBtn.style.pointerEvents = "none";
            const cd = setInterval(() => {
                t--; closeBtn.innerText = t > 0 ? t : "×";
                if(t <= 0) { clearInterval(cd); closeBtn.style.pointerEvents = "auto"; closeBtn.style.background = "#ff4444"; }
            }, 1000);
        }

        function closeInterAd() { document.getElementById("inter-screen").style.display = "none"; }
        window.onload = () => { menuScreen.style.display = "flex"; };
    </script>
</body>
</html>
