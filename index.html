<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make 10 - Max Revenue</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #e3f2fd; font-family: 'Segoe UI', sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        /* 上部広告：100px固定 */
        #ad-top-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100px; 
            background: #e3f2fd; z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }

        /* ゲームエリア */
        #game-outer { position: absolute; top: 100px; bottom: 0; left: 0; right: 0; background: #e3f2fd; overflow: hidden; z-index: 10; }
        #main-container { height: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; }
        
        /* UI */
        #header-ui { width: 100%; display: flex; justify-content: space-around; padding: 15px 0; z-index: 20; }
        .ui-box { padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 18px; box-shadow: 0 4px rgba(0,0,0,0.05); min-width: 130px; text-align: center; }
        #ui { background: #fff; color: #1e88e5; border: 2px solid #bbdefb; }
        #current-sum { background: #fff; color: #e91e63; border: 2px solid #f8bbd0; transition: transform 0.1s; }

        /* グリッド */
        #grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
            padding: 10px; width: 95%; max-width: 400px; flex-grow: 1; 
            align-content: center; 
        }
        .num-card { 
            aspect-ratio: 1/1; background: white; color: #1e88e5; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; font-weight: bold; cursor: pointer; box-shadow: 0 5px #bbdefb;
            transition: 0.1s;
        }
        .num-card.selected { background: #ffeb3b; color: #333; transform: scale(0.92); box-shadow: inset 0 2px 8px rgba(0,0,0,0.2); }
        
        /* メニュー/リザルト画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 200; padding: 10px;
        }

        /* リザルト用 300x250 広告枠 */
        #ad-middle-box {
            width: 300px; height: 250px; background: #f5f5f5; margin: 15px 0;
            display: none; justify-content: center; align-items: center; 
            border-radius: 12px; overflow: hidden; border: 1px solid #ddd;
        }

        /* 5秒全画面広告 */
        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 330px; background: #fff; position: relative; border-radius: 8px; }
        #close-ad-btn { position: absolute; top: -50px; right: 0px; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; border: 2px solid #fff; cursor: pointer; }

        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 12px; }
        .menu-btn { width: 260px; padding: 16px; font-size: 18px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #retry-btn { background: #1e88e5; color: white; box-shadow: 0 4px #1565c0; }
        #retry-btn:disabled { background: #999; box-shadow: none; opacity: 0.7; }
        .link-btn { background: #ec407a; color: white; box-shadow: 0 4px #ad1457; }
    </style>
</head>
<body>

    <div id="ad-top-container">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-outer">
        <div id="main-container">
            <div id="header-ui">
                <div id="ui" class="ui-box">SCORE: 0</div>
                <div id="current-sum" class="ui-box">SUM: 0</div>
            </div>

            <div id="grid"></div>

            <div id="menuScreen">
                <h2 id="result-msg" style="color:#1565c0; margin: 5px 0; font-size: 32px; text-align: center;">Make 10</h2>
                <p id="sub-msg" style="font-size: 14px; color: #78909c; margin-top: 0;">数字を足して10を作ろう！</p>
                
                <div id="ad-middle-box">
                    <ins class="adsbygoogle"
                         style="display:inline-block;width:300px;height:250px"
                         data-ad-client="ca-pub-1299640300068792"
                         data-ad-slot="9050127185"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                </div>

                <div class="menu-btn-group">
                    <button id="retry-btn" class="menu-btn" onclick="startNewGame()">★ スタート ★</button>
                    <a href="https://saaaachi.github.io/" class="menu-btn link-btn">他のゲーム</a>
                </div>
            </div>
        </div>
    </div>

    <div id="inter-screen">
        <div class="inter-content">
            <div id="close-ad-btn" onclick="closeInterAd()">5</div>
            <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:8px; background: #fff;"></iframe>
        </div>
    </div>

    <script>
        let score = 0, currentSum = 0, selectedCards = [], gameActive = false, timer, playCount = 0;
        const grid = document.getElementById("grid");
        const sumDisplay = document.getElementById("current-sum");
        const scoreDisplay = document.getElementById("ui");
        const menuScreen = document.getElementById("menuScreen");
        const adMid = document.getElementById("ad-middle-box");
        const resultMsg = document.getElementById("result-msg");
        const retryBtn = document.getElementById("retry-btn");

        function startNewGame() {
            menuScreen.style.display = "none"; adMid.style.display = "none";
            score = 0; currentSum = 0; selectedCards = []; gameActive = true;
            scoreDisplay.innerText = "SCORE: 0";
            sumDisplay.innerText = "SUM: 0";
            fillGrid();
            resetTimer();
        }

        function fillGrid() {
            grid.innerHTML = "";
            for(let i=0; i<16; i++) {
                const card = document.createElement("div");
                card.className = "num-card";
                card.innerText = Math.floor(Math.random() * 8) + 1;
                card.onclick = () => tapCard(card);
                grid.appendChild(card);
            }
        }

        function tapCard(card) {
            if(!gameActive || card.classList.contains('selected')) return;
            card.classList.add('selected');
            selectedCards.push(card);
            currentSum += parseInt(card.innerText);
            sumDisplay.innerText = "SUM: " + currentSum;

            if(currentSum === 10) {
                score++;
                scoreDisplay.innerText = "SCORE: " + score;
                // 合計表示を強調
                sumDisplay.style.transform = "scale(1.2)";
                setTimeout(() => sumDisplay.style.transform = "scale(1.0)", 100);

                const tempSelected = [...selectedCards];
                tempSelected.forEach(c => {
                    c.style.transform = "scale(0)";
                    c.style.opacity = "0";
                    setTimeout(() => {
                        c.classList.remove('selected');
                        c.innerText = Math.floor(Math.random() * 8) + 1;
                        c.style.transform = "scale(1)";
                        c.style.opacity = "1";
                    }, 250);
                });
                resetSelection();
                resetTimer();
            } else if(currentSum > 10) {
                gameOver("10を超えちゃった！😱");
            }
        }

        function resetSelection() {
            currentSum = 0;
            selectedCards = [];
            setTimeout(() => { sumDisplay.innerText = "SUM: 0"; }, 200);
        }

        function resetTimer() {
            clearTimeout(timer);
            // スコアに応じて難易度アップ
            let limit = Math.max(2500, 10000 - score * 400);
            timer = setTimeout(() => { gameOver("時間切れ！⏳"); }, limit);
        }

        function gameOver(msg) {
            if (!gameActive) return;
            gameActive = false; playCount++;
            clearTimeout(timer);
            
            retryBtn.innerText = "お待ちください..."; retryBtn.disabled = true;
            adMid.style.display = "flex";
            resultMsg.innerText = msg;
            document.getElementById("sub-msg").innerText = "最終スコア: " + score;
            menuScreen.style.display = "flex";

            setTimeout(() => { retryBtn.disabled = false; retryBtn.innerText = "もう一度遊ぶ"; }, 1500);

            // 【2-5-8 収益サイクル】
            if (playCount === 2 || (playCount >= 5 && (playCount - 2) % 3 === 0)) {
                setTimeout(showInterAd, 500);
            }
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), closeBtn = document.getElementById("close-ad-btn"), ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let timerVal = 5;
            closeBtn.innerText = timerVal; closeBtn.style.pointerEvents = "none"; closeBtn.style.background = "#555";
            const countdown = setInterval(() => {
                timerVal--;
                if (timerVal > 0) closeBtn.innerText = timerVal;
                else {
                    clearInterval(countdown);
                    closeBtn.innerText = "×";
                    closeBtn.style.background = "#ff4444";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }

        window.onload = () => { menuScreen.style.display = "flex"; };
    </script>
</body>
</html>
